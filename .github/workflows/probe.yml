name: Probe Registry

on:
  schedule:
    # Daily at 08:00 UTC
    - cron: "0 8 * * *"
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run probe (detect + auto-fill attachments)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: python scripts/probe.py --apply

      - name: Validate and regenerate manifest
        run: python scripts/validate.py

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git diff --name-only)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "files=$(git diff --name-only | tr '\n' ' ')" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add providers/ manifest.json probe_report.md
          git commit -m "chore: auto-update registry from probe

  Auto-filled attachment capabilities and detected model changes.

  Files changed: ${{ steps.changes.outputs.files }}

  See probe_report.md for details."
          git push

      - name: Create issue for models needing manual review
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 -c "
          import json, subprocess, sys

          # Read the probe report and check if there are models needing review
          try:
              with open('probe_report.md') as f:
                  content = f.read()
          except FileNotFoundError:
              print('No probe report found, skipping issue creation')
              sys.exit(0)

          # Check if there are any sections needing review
          has_review = '## Needs Manual Review' in content or '## Default Context Window' in content
          if not has_review:
              print('No models need manual review, skipping issue creation')
              sys.exit(0)

          # Check if there's already an open issue with this label
          result = subprocess.run(
              ['gh', 'issue', 'list', '--label', 'registry-needs-review', '--state', 'open', '--json', 'number'],
              capture_output=True, text=True
          )
          existing = json.loads(result.stdout) if result.stdout.strip() else []
          if existing:
              print(f'Issue already exists: #{existing[0][\"number\"]}, skipping')
              sys.exit(0)

          # Build issue body — extract all review sections from the report
          sections = []
          for header in ['## Needs Manual Review (probed providers, no attachment info)',
                         '## Needs Manual Review (unprobed providers, no attachment info)',
                         '## Default Context Window (200k — likely unset)']:
              if header in content:
                  section = content.split(header)[1].split('##')[0].strip()
                  sections.append(f'### {header.replace(\"## \", \"\")}\n\n{section}')

          body = '''The daily registry probe detected models that need manual review.

          ''' + '\n\n'.join(sections) + '''

          ## What to do

          For each model above:
          1. Check the provider documentation or API for attachment support (images, audio, video, documents)
          2. Verify and correct the context_window_tokens if it is stuck at 200000 (NAVI default)
          3. Update the corresponding \`providers/<id>.json\` file with the appropriate fields
          4. Add a rule to \`scripts/model_rules.json\` so future detections are auto-filled
          5. Run \`python scripts/validate.py\` to regenerate the manifest
          5. Close this issue

          This issue was created automatically by the \`probe.yml\` workflow.
          '''

          subprocess.run([
              'gh', 'issue', 'create',
              '--title', 'Registry models need attachment review',
              '--label', 'registry-needs-review',
              '--body', body
          ])
          print('Issue created')
          "

      - name: Upload probe report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: probe-report
          path: probe_report.md
          retention-days: 30
